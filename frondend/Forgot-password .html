<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Face Attendance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
    }

    /* Navbar */
    .navbar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-left { display: flex; align-items: center; gap: 10px; }
    .brand    { font-size: 16px; font-weight: 700; color: #111827; }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-right a {
      font-size: 14px; color: #6b7280;
      text-decoration: none; font-weight: 500;
    }
    .nav-right a:hover { color: #111827; }

    /* Page wrapper */
    .page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 60px);
      padding: 32px 16px;
    }

    /* Card */
    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      padding: 40px 36px;
      width: 460px;
      max-width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    /* Logo row */
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .logo-row img  { width: 40px; height: 40px; border-radius: 10px; object-fit: contain; }
    .logo-row span { font-size: 17px; font-weight: 700; color: #111827; }

    /* Typography */
    .card-title {
      font-size: 22px; font-weight: 700;
      color: #111827; text-align: center;
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 13px; color: #6b7280;
      text-align: center; line-height: 1.6;
      margin-bottom: 20px;
    }

    /* Inputs */
    .card input {
      display: block;
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      color: #111827;
      background: #fff;
      margin-bottom: 12px;
      outline: none;
      transition: border-color .15s;
    }
    .card input:focus { border-color: #6366f1; }

    /* Button */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 12px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background .15s;
    }
    .btn-primary:hover { background: #4f46e5; }

    /* Message */
    .msg {
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
    }

    /* Back link */
    .back-link {
      display: block;
      text-align: center;
      font-size: 13px;
      color: #6366f1;
      margin-top: 16px;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }

    /* Steps */
    .step         { display: none; }
    .step.active  { display: block; }

    /* Success icon */
    .success-icon {
      font-size: 52px;
      text-align: center;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-left">
      <img src="assets/faceattendance-2.png" alt="Logo"
        style="width:34px;height:34px;border-radius:8px;object-fit:contain;" />
      <span class="brand">Face Attendance</span>
    </div>
    <div class="nav-right">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </div>
  </nav>

  <!-- Page -->
  <div class="page">
    <div class="card">

      <!-- Logo -->
      <div class="logo-row">
        <img src="assets/faceattendance-2.png" alt="Logo" />
        <span>Face Attendance</span>
      </div>

      <!-- Step 1: Verify -->
      <div class="step active" id="step1">
        <h2 class="card-title">Forgot Password</h2>
        <p class="card-sub">Enter your username and Faculty ID to verify your identity</p>

        <input type="text"     id="username"  placeholder="Username" />
        <input type="text"     id="facultyId" placeholder="Faculty ID (e.g. FAC-2024-001)" />

        <button class="btn-primary" onclick="verifyIdentity()">Verify Identity</button>
        <p class="msg" id="verifyMsg"></p>

        <a class="back-link" href="login.html">← Back to Login</a>
      </div>

      <!-- Step 2: New password -->
      <div class="step" id="step2">
        <h2 class="card-title">Set New Password</h2>
        <p class="card-sub" id="verifiedName">Identity verified!</p>

        <input type="password" id="newPassword"     placeholder="New Password (min 6 chars)" />
        <input type="password" id="confirmPassword" placeholder="Confirm New Password" />

        <button class="btn-primary" onclick="resetPassword()">Reset Password</button>
        <p class="msg" id="resetMsg"></p>
      </div>

      <!-- Step 3: Success -->
      <div class="step" id="step3">
        <div class="success-icon">✅</div>
        <h2 class="card-title">Password Reset!</h2>
        <p class="card-sub">Your password has been updated successfully.</p>
        <button class="btn-primary" onclick="window.location.href='login.html'"
          style="margin-top:8px">Go to Login</button>
      </div>

    </div>
  </div>

  <script>
    let verifiedUsername = "";

    function showStep(id) {
      document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    async function verifyIdentity() {
      const username  = document.getElementById("username").value.trim();
      const facultyId = document.getElementById("facultyId").value.trim();
      const msg       = document.getElementById("verifyMsg");

      if (!username || !facultyId) {
        msg.style.color = "red";
        msg.textContent = "Please fill both fields";
        return;
      }

      try {
        const res  = await fetch("http://127.0.0.1:5000/api/verify-faculty", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ username, faculty_id: facultyId })
        });
        const data = await res.json();

        if (data.success) {
          verifiedUsername = username;
          document.getElementById("verifiedName").textContent =
            `✔ Verified as ${data.name}. Set your new password below.`;
          showStep("step2");
        } else {
          msg.style.color = "red";
          msg.textContent = data.error || "Username or Faculty ID does not match";
        }
      } catch(e) {
        msg.style.color = "red";
        msg.textContent = "Backend not reachable";
      }
    }

    async function resetPassword() {
      const newPassword     = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const msg             = document.getElementById("resetMsg");

      if (!newPassword || !confirmPassword) {
        msg.style.color = "red"; msg.textContent = "Please fill both fields"; return;
      }
      if (newPassword !== confirmPassword) {
        msg.style.color = "red"; msg.textContent = "Passwords do not match"; return;
      }
      if (newPassword.length < 6) {
        msg.style.color = "red"; msg.textContent = "Minimum 6 characters required"; return;
      }

      try {
        const res  = await fetch("http://127.0.0.1:5000/api/reset-password", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ username: verifiedUsername, password: newPassword })
        });
        const data = await res.json();
        if (data.success) {
          showStep("step3");
        } else {
          msg.style.color = "red";
          msg.textContent = data.error || "Failed to reset password";
        }
      } catch(e) {
        msg.style.color = "red"; msg.textContent = "Backend not reachable";
      }
    }
  </script>
</body>
</html>
